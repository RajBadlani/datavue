<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40" fill="none">
  <!-- Rounded square base -->
  <rect width="40" height="40" rx="10" fill="#313852"/>
  <!-- Data grid lines (subtle, representing database/tables) -->
  <path d="M10 16h20M10 24h20M16 10v20M24 10v20" stroke="#4A5068" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <!-- Bold X crossing through - the "intelligence" arrow -->
  <path d="M12 28L28 12" stroke="#5849F2" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M23 12L28 12L28 17" stroke="#5849F2" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Accent dot - representing insight/answer -->
  <circle cx="12" cy="28" r="2.5" fill="#5849F2"/>
</svg>
